<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --panel: #16161f;
    --gold: #c9a84c;
    --gold-light: #e8c96d;
    --gold-dim: #7a6230;
    --white-key: #f5f0e8;
    --white-key-pressed: #d4c9a8;
    --black-key: #1a1a22;
    --black-key-pressed: #3a3a50;
    --glow: rgba(201, 168, 76, 0.4);
    --text: #c8c0b0;
    --text-dim: #6a6258;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    color: var(--text);
    overflow: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 50% 100%, rgba(201,168,76,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 60% 30% at 20% 50%, rgba(60,40,120,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 30% at 80% 50%, rgba(60,40,120,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  .app {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    width: 100%;
    padding: 20px;
  }

  /* Header */
  .header {
    text-align: center;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }
  .header p {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    margin-top: 4px;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .control-label {
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .control-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 90px;
    height: 2px;
    background: var(--gold-dim);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--glow);
  }

  .btn {
    background: var(--panel);
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    padding: 6px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .btn:hover {
    background: var(--gold-dim);
    border-color: var(--gold);
    box-shadow: 0 0 12px var(--glow);
  }
  .btn.active {
    background: var(--gold);
    color: var(--bg);
  }

  select {
    background: var(--panel);
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    padding: 5px 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  /* Octave indicator */
  .octave-display {
    font-size: 1rem;
    color: var(--gold);
    min-width: 20px;
    text-align: center;
  }

  /* Note display */
  .note-display {
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }
  .note-display .active-note {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--gold-light);
    text-shadow: 0 0 20px var(--glow);
    min-width: 60px;
    text-align: center;
    transition: all 0.1s;
  }

  /* Piano wrapper */
  .piano-wrapper {
    background: var(--panel);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 8px;
    padding: 20px 24px 0;
    box-shadow:
      0 0 60px rgba(0,0,0,0.6),
      0 0 120px rgba(201,168,76,0.03),
      inset 0 1px 0 rgba(201,168,76,0.1);
    position: relative;
  }

  /* Piano rail top */
  .piano-rail {
    height: 8px;
    background: linear-gradient(to bottom, var(--gold-dim), rgba(90,70,30,0.3));
    border-radius: 3px 3px 0 0;
    margin-bottom: 4px;
    box-shadow: 0 0 10px rgba(201,168,76,0.2);
  }

  /* Keyboard container */
  .keyboard {
    display: flex;
    position: relative;
    height: 140px;
    user-select: none;
  }

  /* White keys */
  .key-white {
    position: relative;
    width: 26px;
    height: 140px;
    background: linear-gradient(to bottom, var(--white-key) 0%, #e8e3d5 70%, #d5cfc0 100%);
    border: 1px solid #c0bbb0;
    border-top: none;
    border-radius: 0 0 5px 5px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 6px;
    transition: background 0.05s;
    box-shadow:
      inset -1px 0 0 rgba(0,0,0,0.1),
      2px 4px 8px rgba(0,0,0,0.4);
    z-index: 1;
    flex-shrink: 0;
  }

  .key-white:hover {
    background: linear-gradient(to bottom, #fffdf5 0%, #f0ebe0 70%, #ddd8c8 100%);
  }

  .key-white.pressed {
    background: linear-gradient(to bottom, var(--white-key-pressed) 0%, #c8c0a0 70%, #b8b098 100%);
    box-shadow:
      inset -1px 0 0 rgba(0,0,0,0.15),
      1px 2px 4px rgba(0,0,0,0.4);
    transform: translateY(2px);
  }

  .key-white.pressed::after {
    content: '';
    position: absolute;
    bottom: 5px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.3) 0%, transparent 70%);
  }

  /* Black keys */
  .key-black {
    position: absolute;
    width: 16px;
    height: 88px;
    background: linear-gradient(to bottom, var(--black-key) 0%, #0d0d15 60%, #1a1a25 100%);
    border: 1px solid #333;
    border-top: none;
    border-radius: 0 0 4px 4px;
    cursor: pointer;
    z-index: 2;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 8px;
    top: 0;
    box-shadow:
      2px 6px 12px rgba(0,0,0,0.8),
      inset 0 -2px 4px rgba(255,255,255,0.03);
    transition: background 0.05s;
  }

  .key-black:hover {
    background: linear-gradient(to bottom, #2a2a35 0%, #151520 60%, #222230 100%);
  }

  .key-black.pressed {
    background: linear-gradient(to bottom, var(--black-key-pressed) 0%, #252535 60%, #353545 100%);
    box-shadow:
      1px 3px 6px rgba(0,0,0,0.8),
      0 0 15px rgba(201,168,76,0.2),
      inset 0 -1px 3px rgba(255,255,255,0.05);
    transform: translateY(2px);
  }

  /* Key labels */
  .key-label {
    font-size: 0.5rem;
    letter-spacing: 0;
    opacity: 0.5;
    pointer-events: none;
    text-align: center;
    line-height: 1.2;
  }
  .key-white .key-label { color: #888; }
  .key-black .key-label { color: #888; font-size: 0.45rem; }

  .key-white .note-name {
    font-size: 0.55rem;
    color: #666;
    margin-bottom: 2px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
  }
  .key-black .note-name {
    font-size: 0.45rem;
    color: #666;
    margin-bottom: 2px;
  }

  /* Piano bottom */
  .piano-bottom {
    height: 16px;
    background: linear-gradient(to bottom, #0e0e18, #08080f);
    border-radius: 0 0 6px 6px;
    border: 1px solid rgba(201,168,76,0.1);
    border-top: none;
  }

  /* Keyboard map legend */
  .kb-legend {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 800px;
    font-size: 0.5rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }
  .kb-legend span {
    background: var(--surface);
    border: 1px solid #333;
    padding: 2px 6px;
    border-radius: 3px;
  }
  .kb-legend span b {
    color: var(--gold);
  }

  /* Active notes visualizer */
  .visualizer {
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 30px;
  }
  .viz-bar {
    width: 3px;
    background: var(--gold-dim);
    border-radius: 2px;
    transition: height 0.1s, background 0.1s;
    min-height: 2px;
  }
  .viz-bar.active {
    background: var(--gold);
    box-shadow: 0 0 6px var(--glow);
  }

  /* Sustain glow */
  .sustain-active {
    box-shadow: 0 0 30px rgba(201,168,76,0.15) !important;
  }

  @media (max-width: 900px) {
    .key-white { width: 36px; }
    .key-black { width: 22px; height: 110px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Grand Piano</h1>
    <p>Full 88-key · Keyboard Playable</p>
  </div>

  <div class="controls">
    <div class="control-group">
      <span class="control-label">Octave</span>
      <div class="control-row">
        <button class="btn" id="octDown">−</button>
        <span class="octave-display" id="octaveNum">4</span>
        <button class="btn" id="octUp">+</button>
      </div>
    </div>
    <div class="control-group">
      <span class="control-label">Volume</span>
      <div class="control-row">
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7">
      </div>
    </div>
    <div class="control-group">
      <span class="control-label">Reverb</span>
      <div class="control-row">
        <input type="range" id="reverb" min="0" max="1" step="0.01" value="0.3">
      </div>
    </div>
    <div class="control-group">
      <span class="control-label">Sustain</span>
      <div class="control-row">
        <button class="btn" id="sustainBtn">OFF</button>
      </div>
    </div>
    <div class="control-group">
      <span class="control-label">Waveform</span>
      <div class="control-row">
        <select id="waveform">
          <option value="piano">Piano</option>
          <option value="sine">Sine</option>
          <option value="triangle">Triangle</option>
          <option value="sawtooth">Sawtooth</option>
        </select>
      </div>
    </div>
  </div>

  <div class="note-display">
    <div class="visualizer" id="visualizer"></div>
    <div class="active-note" id="activeNote">—</div>
    <div class="visualizer" id="visualizer2"></div>
  </div>

  <div class="piano-wrapper" id="pianoWrapper">
    <div class="piano-rail"></div>
    <div class="keyboard" id="keyboard"></div>
    <div class="piano-bottom"></div>
  </div>

  <div class="kb-legend">
    <span><b>A–K</b> white keys</span>
    <span><b>W,E,T,Y,U</b> black keys</span>
    <span><b>Z/X</b> octave −/+</span>
    <span><b>Space</b> sustain</span>
    <span><b>Shift+…</b> +1 octave</span>
  </div>
</div>

<script>
// ─── AudioContext ───────────────────────────────────────────────
const AudioContext = window.AudioContext || window.webkitAudioContext;
let ctx = null;
let masterGain, reverbNode, reverbGain, dryGain;
let sustainOn = false;

// noteKey -> { oscs, env, stopping }
// stopping: true means release has been initiated, don't retrigger sustain hold
const activeNodes = {};

// Set of midi numbers held by sustain pedal after key-up
const sustainedNotes = new Set();

function initAudio() {
  if (ctx) return;
  ctx = new AudioContext();

  masterGain = ctx.createGain();
  masterGain.gain.value = 0.7;
  masterGain.connect(ctx.destination);

  reverbNode = ctx.createConvolver();
  reverbNode.buffer = makeReverbBuffer(ctx, 2.0, 3);

  reverbGain = ctx.createGain();
  reverbGain.gain.value = 0.3;

  dryGain = ctx.createGain();
  dryGain.gain.value = 0.7;

  reverbNode.connect(reverbGain);
  reverbGain.connect(masterGain);
  dryGain.connect(masterGain);
}

function makeReverbBuffer(ctx, duration, decay) {
  const rate = ctx.sampleRate;
  const length = rate * duration;
  const buf = ctx.createBuffer(2, length, rate);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < length; i++)
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
  }
  return buf;
}

function setVolume(v) { if (masterGain) masterGain.gain.value = v; }
function setReverb(v) {
  if (!reverbGain) return;
  reverbGain.gain.value = v;
  dryGain.gain.value = 1 - v * 0.5;
}

// ─── Note frequencies ─────────────────────────────────────────
function noteFreq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }

// ─── Forcibly kill a node immediately ─────────────────────────
function killNode(node) {
  if (!node || node.dead) return;
  node.dead = true;
  const t = ctx.currentTime;
  try {
    node.env.gain.cancelScheduledValues(t);
    node.env.gain.setValueAtTime(0, t);
  } catch(e) {}
  node.oscs.forEach(o => { try { o.stop(t); } catch(e) {} });
  node.env.disconnect();
}

// ─── Piano tone synthesis ──────────────────────────────────────
function playNote(midi, velocity = 0.8) {
  initAudio();
  if (ctx.state === 'suspended') ctx.resume();

  const wf = document.getElementById('waveform').value;
  const freq = noteFreq(midi);
  const key = `m${midi}`;

  // Kill any existing node for this midi immediately
  if (activeNodes[key]) {
    killNode(activeNodes[key]);
    delete activeNodes[key];
  }

  const outGain = ctx.createGain();
  outGain.gain.setValueAtTime(0, ctx.currentTime);
  outGain.connect(dryGain);
  outGain.connect(reverbNode);

  const oscs = [];
  if (wf === 'piano') {
    const partials = [
      { type: 'triangle', mult: 1,   vol: 0.60 },
      { type: 'sine',     mult: 2,   vol: 0.22 },
      { type: 'sine',     mult: 3,   vol: 0.10 },
      { type: 'sine',     mult: 4,   vol: 0.05 },
    ];
    partials.forEach(p => {
      const o = ctx.createOscillator();
      o.type = p.type;
      o.frequency.value = freq * p.mult;
      const g = ctx.createGain();
      g.gain.value = p.vol;
      o.connect(g); g.connect(outGain);
      o.start();
      oscs.push(o);
    });
  } else {
    const o = ctx.createOscillator();
    o.type = wf;
    o.frequency.value = freq;
    o.connect(outGain);
    o.start();
    oscs.push(o);
  }

  // ADSR: attack → decay → sustain level (hold while key pressed)
  const now = ctx.currentTime;
  const atk  = 0.010;
  const peak = velocity * 0.85;
  const susLevel = wf === 'piano' ? peak * 0.38 : peak * 0.70;
  const decTime  = wf === 'piano' ? 0.35 : 0.08;

  outGain.gain.setValueAtTime(0, now);
  outGain.gain.linearRampToValueAtTime(peak, now + atk);
  // exponential decay to sustain level — use setTargetAtTime
  outGain.gain.setTargetAtTime(susLevel, now + atk, decTime);

  activeNodes[key] = { oscs, env: outGain, dead: false, stopping: false };
}

function stopNote(midi) {
  const key = `m${midi}`;
  const node = activeNodes[key];
  if (!node || node.dead || node.stopping) return;

  // If sustain pedal is on, don't release yet — remember for later
  if (sustainOn) {
    sustainedNotes.add(midi);
    return;
  }

  _releaseNode(key, node);
}

function _releaseNode(key, node) {
  if (!node || node.dead || node.stopping) return;
  node.stopping = true;

  const t = ctx.currentTime;
  const release = 0.45; // release time in seconds

  // Snapshot the current gain to avoid a jump
  const currentGain = node.env.gain.value;
  node.env.gain.cancelScheduledValues(t);
  node.env.gain.setValueAtTime(currentGain, t);
  node.env.gain.linearRampToValueAtTime(0, t + release);

  // Stop oscillators after release + small buffer, then clean up
  const stopMs = (release + 0.08) * 1000;
  setTimeout(() => {
    if (node.dead) return;
    node.dead = true;
    node.oscs.forEach(o => { try { o.stop(); } catch(e) {} });
    node.env.disconnect();
    if (activeNodes[key] === node) delete activeNodes[key];
  }, stopMs);
}

function releaseSustainedNotes() {
  sustainedNotes.forEach(midi => {
    const key = `m${midi}`;
    const node = activeNodes[key];
    if (node) _releaseNode(key, node);
  });
  sustainedNotes.clear();
}

// Emergency stop all — used on window blur / visibility change
function stopAllNotes() {
  Object.keys(activeNodes).forEach(key => {
    const node = activeNodes[key];
    killNode(node);
    delete activeNodes[key];
  });
  sustainedNotes.clear();
  pressedKeys.clear();
  document.querySelectorAll('.pressed').forEach(el => el.classList.remove('pressed'));
  clearActiveNote();
}

// ─── Piano key layout (88 keys: A0 to C8, MIDI 21-108) ────────
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const WHITE_STEPS = [0,2,4,5,7,9,11]; // semitones for C D E F G A B

function buildKeyboard() {
  const keyboard = document.getElementById('keyboard');
  keyboard.innerHTML = '';

  // All 88 keys: MIDI 21 (A0) to 108 (C8)
  const whites = [];
  const blacks = [];

  for (let midi = 21; midi <= 108; midi++) {
    const semitone = midi % 12;
    const noteName = NOTE_NAMES[semitone];
    const octave = Math.floor(midi / 12) - 1;
    const isBlack = noteName.includes('#');

    if (!isBlack) whites.push({ midi, noteName, octave });
    else blacks.push({ midi, noteName, octave });
  }

  // Calculate total width
  const wKeyW = 26;
  const bKeyW = 16;
  keyboard.style.width = whites.length * wKeyW + 'px';

  // Render white keys
  whites.forEach((k, i) => {
    const el = document.createElement('div');
    el.className = 'key-white';
    el.dataset.midi = k.midi;
    el.style.left = (i * wKeyW) + 'px';
    el.style.position = 'absolute';
    el.style.width = wKeyW + 'px';
    el.innerHTML = `<span class="note-name">${k.noteName}${k.octave}</span>`;
    keyboard.appendChild(el);
  });

  // Map white key index for midi -> left position
  const whiteIndex = {};
  whites.forEach((k, i) => { whiteIndex[k.midi] = i; });

  // Render black keys
  // Black key positions relative to the white key to their left
  const blackOffset = { 1:0.65, 3:1.65, 6:3.65, 8:4.65, 10:5.65 };

  for (let midi = 21; midi <= 108; midi++) {
    const semitone = midi % 12;
    if (!NOTE_NAMES[semitone].includes('#')) continue;

    const noteName = NOTE_NAMES[semitone];
    const octave = Math.floor(midi / 12) - 1;

    // Find the white key to the left (midi-1)
    const leftWhiteMidi = midi - 1;
    if (whiteIndex[leftWhiteMidi] === undefined) continue;
    const leftIdx = whiteIndex[leftWhiteMidi];
    const leftPos = leftIdx * wKeyW;

    const offset = blackOffset[semitone];
    if (offset === undefined) continue;

    const el = document.createElement('div');
    el.className = 'key-black';
    el.dataset.midi = midi;
    const xPos = leftPos + wKeyW - (bKeyW * (1 - (offset % 1)));
    el.style.left = (leftPos + wKeyW * 0.65) + 'px';
    el.innerHTML = `<span class="key-label">${noteName.replace('#','♯')}</span>`;
    keyboard.appendChild(el);
  }

  // Build visualizer bars
  const viz1 = document.getElementById('visualizer');
  const viz2 = document.getElementById('visualizer2');
  [viz1, viz2].forEach(v => {
    v.innerHTML = '';
    for (let i = 0; i < 20; i++) {
      const b = document.createElement('div');
      b.className = 'viz-bar';
      b.style.height = (Math.random() * 8 + 2) + 'px';
      v.appendChild(b);
    }
  });
}

// ─── Keyboard mapping ──────────────────────────────────────────
// Base octave 4: keyboard maps to one octave + a bit
// White: A S D F G H J K L ; '
// Black: W E   T Y U   O P
let baseOctave = 4;

const KB_WHITE  = ['a','s','d','f','g','h','j','k','l',';',"'",'\\'];
const KB_BLACK  = ['w','e','','t','y','u','','o','p'];

// Build note mapping per octave
function getMidiForKey(key) {
  const lower = key.toLowerCase();
  // White keys → C D E F G A B C D E F G
  const whiteNotes = [0,2,4,5,7,9,11,12,14,16,17,19];
  const wi = KB_WHITE.indexOf(lower);
  if (wi !== -1) {
    const base = (baseOctave + 1) * 12; // C of base octave
    return base + whiteNotes[wi];
  }
  // Black keys
  const blackNotes = [1,3,-1,6,8,10,-1,13,15];
  const bi = KB_BLACK.indexOf(lower);
  if (bi !== -1 && blackNotes[bi] !== -1) {
    const base = (baseOctave + 1) * 12;
    return base + blackNotes[bi];
  }
  return null;
}

// Map from keyboard key -> midi number currently sounding
const pressedKeys = new Map();

document.addEventListener('keydown', e => {
  if (e.repeat) return;
  const k = e.key.toLowerCase();

  if (k === 'z') { changeOctave(-1); return; }
  if (k === 'x') { changeOctave(1); return; }
  if (k === ' ') { e.preventDefault(); toggleSustain(); return; }

  if (pressedKeys.has(k)) return;
  const midi = getMidiForKey(k);
  if (midi !== null) {
    pressedKeys.set(k, midi);
    triggerNote(midi, true);
  }
});

document.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if (pressedKeys.has(k)) {
    const midi = pressedKeys.get(k);
    pressedKeys.delete(k);
    triggerNote(midi, false);
  }
});

// Stop all notes if window loses focus
window.addEventListener('blur', () => stopAllNotes());
document.addEventListener('visibilitychange', () => { if (document.hidden) stopAllNotes(); });

function triggerNote(midi, on) {
  const el = document.querySelector(`[data-midi="${midi}"]`);
  if (on) {
    playNote(midi);
    if (el) el.classList.add('pressed');
    showActiveNote(midi);
    animateViz();
  } else {
    stopNote(midi);
    if (el) el.classList.remove('pressed');
    clearActiveNote();
  }
}

function changeOctave(dir) {
  baseOctave = Math.max(0, Math.min(7, baseOctave + dir));
  document.getElementById('octaveNum').textContent = baseOctave;
}

function toggleSustain() {
  sustainOn = !sustainOn;
  const btn = document.getElementById('sustainBtn');
  btn.textContent = sustainOn ? 'ON' : 'OFF';
  btn.classList.toggle('active', sustainOn);
  document.getElementById('pianoWrapper').classList.toggle('sustain-active', sustainOn);
  if (!sustainOn) releaseSustainedNotes();
}

// ─── Mouse / touch ────────────────────────────────────────────
let mouseDown = false;
let mouseActiveNote = null; // midi currently held by mouse

function mousePress(midi) {
  if (mouseActiveNote !== null && mouseActiveNote !== midi) mouseRelease();
  if (mouseActiveNote === null) {
    mouseActiveNote = midi;
    triggerNote(midi, true);
  }
}
function mouseRelease() {
  if (mouseActiveNote !== null) {
    triggerNote(mouseActiveNote, false);
    mouseActiveNote = null;
  }
}

// Global mouseup — catches release anywhere on the page
document.addEventListener('mouseup', () => { mouseDown = false; mouseRelease(); });
document.addEventListener('mouseleave', () => { mouseDown = false; mouseRelease(); });

const kbEl = document.getElementById('keyboard');

kbEl.addEventListener('mousedown', e => {
  const key = e.target.closest('[data-midi]');
  if (!key) return;
  e.preventDefault();
  mouseDown = true;
  mousePress(+key.dataset.midi);
});

kbEl.addEventListener('mousemove', e => {
  if (!mouseDown) return;
  const key = e.target.closest('[data-midi]');
  if (!key) return;
  const midi = +key.dataset.midi;
  if (midi !== mouseActiveNote) mousePress(midi);
});

kbEl.addEventListener('mouseleave', () => {
  if (mouseDown) mouseRelease();
});

// Touch — track each finger independently
const touchMap = new Map(); // touchId -> midi

kbEl.addEventListener('touchstart', e => {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => {
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const key = el && el.closest('[data-midi]');
    if (!key) return;
    const midi = +key.dataset.midi;
    touchMap.set(t.identifier, midi);
    triggerNote(midi, true);
  });
}, { passive: false });

kbEl.addEventListener('touchmove', e => {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => {
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const key = el && el.closest('[data-midi]');
    const newMidi = key ? +key.dataset.midi : null;
    const oldMidi = touchMap.get(t.identifier);
    if (newMidi !== oldMidi) {
      if (oldMidi !== undefined) triggerNote(oldMidi, false);
      if (newMidi !== null) {
        touchMap.set(t.identifier, newMidi);
        triggerNote(newMidi, true);
      } else {
        touchMap.delete(t.identifier);
      }
    }
  });
}, { passive: false });

function touchEnd(e) {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => {
    const midi = touchMap.get(t.identifier);
    if (midi !== undefined) {
      touchMap.delete(t.identifier);
      triggerNote(midi, false);
    }
  });
}
kbEl.addEventListener('touchend', touchEnd, { passive: false });
kbEl.addEventListener('touchcancel', touchEnd, { passive: false });

// ─── UI helpers ───────────────────────────────────────────────
const NOTE_DISPLAY = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];
function showActiveNote(midi) {
  const name = NOTE_DISPLAY[midi % 12];
  const oct = Math.floor(midi / 12) - 1;
  document.getElementById('activeNote').textContent = name + oct;
}
function clearActiveNote() {
  const anyActive = Object.values(activeNodes).some(n => n && !n.stopping && !n.dead);
  if (!anyActive) document.getElementById('activeNote').textContent = '—';
}

function animateViz() {
  const bars = document.querySelectorAll('.viz-bar');
  bars.forEach(b => {
    b.classList.add('active');
    b.style.height = (Math.random() * 22 + 4) + 'px';
    setTimeout(() => {
      b.classList.remove('active');
      b.style.height = (Math.random() * 8 + 2) + 'px';
    }, 200 + Math.random() * 200);
  });
}

// ─── Controls wiring ─────────────────────────────────────────
document.getElementById('volume').addEventListener('input', e => setVolume(+e.target.value));
document.getElementById('reverb').addEventListener('input', e => setReverb(+e.target.value));
document.getElementById('octDown').addEventListener('click', () => changeOctave(-1));
document.getElementById('octUp').addEventListener('click', () => changeOctave(1));
document.getElementById('sustainBtn').addEventListener('click', toggleSustain);

// ─── Scroll piano to middle C ─────────────────────────────────
function scrollToMiddleC() {
  const c4 = document.querySelector('[data-midi="60"]');
  const wrapper = document.getElementById('pianoWrapper');
  if (c4 && wrapper) {
    wrapper.scrollLeft = c4.offsetLeft - wrapper.offsetWidth / 2 + 21;
  }
}

// Make wrapper scrollable
const pianoWrapper = document.getElementById('pianoWrapper');
pianoWrapper.style.overflowX = 'auto';
pianoWrapper.style.maxWidth = '95vw';

// ─── Init ─────────────────────────────────────────────────────
buildKeyboard();
scrollToMiddleC();

// Responsive recalc
window.addEventListener('resize', () => { buildKeyboard(); scrollToMiddleC(); });
</script>
